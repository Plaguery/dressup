<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="default.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Fredoka&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="assets/faces.png" />
    <title>Dress Up</title>
  </head>

  <body>
    <h1 class="cherry-bomb">Dress Up</h1>
    <h2>by plague</h2>
    <br />
    <div class="col">
      <div class="row" id="mainDisplay">
        <div class="col" id="optionSection">
          <div class="optionButton" id="hats" title="hats">
            <img src="assets/hats.png" />
          </div>
          <div class="optionButton" id="faces" title="faces">
            <img src="assets/faces.png" />
          </div>
          <div class="optionButton" id="shirts" title="shirts">
            <img src="assets/shirts.png" />
          </div>
          <div class="optionButton" id="pants" title="pants">
            <img src="assets/pants.png" />
          </div>
          <div class="optionButton" id="accessories" title="accessories">
            <img src="assets/accessories.png" />
          </div>
        </div>
        <div id="avatardisplay"><img src="assets/body.png" /></div>
        <div class="col" id="selectMain">
          <div class="col" id="selectSection"></div>
          <div class="col" id="controllerBox">
            <button class="adjustButton" id="up">
              <img src="assets/arrowUp.png" />
            </button>
            <div class="row">
              <button class="adjustButton" id="left">
                <img src="assets/arrowLeft.png" />
              </button>
              <button class="adjustButton" id="reset">
                <img src="assets/arrowCenter.png" />
              </button>
              <button class="adjustButton" id="right">
                <img src="assets/arrowRight.png" />
              </button>
            </div>
            <button class="adjustButton" id="down">
              <img src="assets/arrowDown.png" />
            </button>
          </div>
        </div>
      </div>
    </div>
    <br />

    <script src="main.js"></script>
  </body>
</html>
